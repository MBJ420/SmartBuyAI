<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBuyAI</title>
    <!-- Bootstrap 5 CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Optional: FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .hero-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 60px 0;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .search-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-top: -60px;
        }

        .product-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .product-img-wrapper {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #fff;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .product-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2a5298;
        }

        #loadingSpinner {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Hero Section -->
    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3"><i class="fas fa-robot"></i> SmartBuyAI</h1>
            <p class="lead">Find the best products across the web, ranked by AI.</p>
        </div>
    </div>

    <div class="container mb-5">
        <!-- Search Box -->
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="search-card">
                    <form id="searchForm" onsubmit="event.preventDefault(); startSearch();">
                        <div class="row g-3 align-items-center">
                            <div class="col-sm-9">
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-white"><i
                                            class="fas fa-search text-muted"></i></span>
                                    <input type="text" id="searchInput" class="form-control"
                                        placeholder="What are you looking for? (laptop)" required>
                                </div>
                            </div>
                            <div class="col-sm-3 d-grid">
                                <button type="submit" class="btn btn-primary btn-lg" id="searchBtn">
                                    Search
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Status & Loading -->
        <div class="row justify-content-center mt-5">
            <div class="col-md-8 text-center">
                <div id="loadingSpinner" class="mb-4">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 class="mt-3 text-muted" id="loadingText">Scraping data from PriceOye... Please wait.</h5>
                </div>
                <!-- Error Message -->
                <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
            </div>
        </div>

        <!-- Results Grid -->
        <div class="row g-4 mt-2" id="resultsGrid">
            <!-- Product cards will be injected here by JavaScript -->
        </div>
    </div>

    <!-- Our Custom JavaScript -->
    <script src="app.js"></script>
</body>

</html>
